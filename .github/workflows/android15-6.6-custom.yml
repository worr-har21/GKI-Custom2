name: Android15-6.6-Custom

on: 
  workflow_dispatch:
    inputs:
      os_patch_level:
        required: true
        type: string
        description: >
          Patch level (z. B. 2024-11 für GKI ZIP; Branch ist fix auf Basis)
          for example: 2024-11
      os_version:
        required: true
        type: string
        description: >
          OS Version of boot image
          for example: 15.0.0
      version_name:
        required: true
        type: string
        description: >
          With SUBLEVEL of kernel,
          for example: android15-6.6-custom
      custom:
        required: true
        type: boolean
        description: >
          Enable LXC, Docker
      kernelsu:
        required: true
        type: boolean
        description: >
          Enable KernelSU

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt install repo wget -y

    - name: Install latest repo tool
      run: |
        curl https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
        chmod a+x /usr/local/bin/repo

    - name: Verify repo version
      run: repo --version

    - name: Sync the kernel source code
      run: |
        cd $GITHUB_WORKSPACE
        mkdir android-kernel
        cd android-kernel
        repo init --depth 1 -u https://android.googlesource.com/kernel/manifest -b common-android15-6.6
        repo sync

    - name: Apply patches and configuration files
      if: ${{ inputs.custom == true }}
      run: |
        cd $GITHUB_WORKSPACE
        git clone https://github.com/rvalyi/GKI-Custom.git gki-patch
        
        # Fallback für Defconfig (keine exakte für 6.6 verfügbar)
        if [ -f ./gki-patch/config/gki_defconfig-android15-6.6 ]; then
          cp ./gki-patch/config/gki_defconfig-android15-6.6 ./android-kernel/common/arch/arm64/configs/gki_defconfig
        else
          echo "Keine exakte Defconfig für 6.6 gefunden – überspringe (nutze Standard gki_defconfig und Patches)"
        fi
        
        cd ./android-kernel/common
        git apply $GITHUB_WORKSPACE/gki-patch/patchs/*.patch || echo "Einige Patches fehlschlagen (normal bei Basis-Branch – manuell fixen, falls nötig)"

    - name: KernelSU
      if: ${{ inputs.kernelsu == true }}
      run: |
          cd $GITHUB_WORKSPACE/android-kernel
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -

    - name: Build Kernel
      run: |
        cd $GITHUB_WORKSPACE/android-kernel
        ls
        tools/bazel build //common:kernel_aarch64_dist

    - name: Prepare artifacts
      id: prepareArtifacts
      run: |
        cd $GITHUB_WORKSPACE
        OUTDIR=android-kernel/out/android15-6.6/dist
        mkdir output
        cp $OUTDIR/Image ./output/
        cp $OUTDIR/Image.lz4 ./output/
        cp $OUTDIR/Image ./
        gzip -n -k -f -9 Image >Image.gz
        git clone https://github.com/Kernel-SU/AnyKernel3
        rm -rf ./AnyKernel3/.git
        cp $OUTDIR/Image ./AnyKernel3/
        wget https://dl.google.com/android/gki/gki-certified-boot-android15-6.6-${{ inputs.os_patch_level }}_r1.zip -O ./gki-kernel.zip || echo "GKI ZIP nicht gefunden – überspringe (nur für boot.img nötig)"
        if [ -f ./gki-kernel.zip ]; then
          unzip -q ./gki-kernel.zip
          rm ./gki-kernel.zip
        fi
        cd $GITHUB_WORKSPACE/android-kernel
        echo "Unpack boot (falls boot.img vorhanden)"
        if ls $GITHUB_WORKSPACE/boot*.img 1> /dev/null 2>&1; then
          ./tools/mkbootimg/unpack_bootimg.py --boot_img $GITHUB_WORKSPACE/boot*.img
        fi
        echo "Build boot.img"
        ./tools/mkbootimg/mkbootimg.py --header_version 4 --kernel out/android15-6.6/dist/Image --ramdisk out/ramdisk --os_version \( {{ inputs.os_version }} --os_patch_level \){{ inputs.os_patch_level }} -o \( GITHUB_WORKSPACE/output/ \){{ inputs.version_name }}_${{ inputs.os_patch_level }}-boot.img
        echo "Build boot-lz4.img"
        ./tools/mkbootimg/mkbootimg.py --header_version 4 --kernel out/android15-6.6/dist/Image.lz4 --ramdisk out/ramdisk --os_version \( {{ inputs.os_version }} --os_patch_level \){{ inputs.os_patch_level }} -o \( GITHUB_WORKSPACE/output/ \){{ inputs.version_name }}_${{ inputs.os_patch_level }}-boot-lz4.img
        echo "Build boot-gz.img"
        ./tools/mkbootimg/mkbootimg.py --header_version 4 --kernel \( GITHUB_WORKSPACE/Image.gz --ramdisk out/ramdisk --os_version \){{ inputs.os_version }} --os_patch_level ${{ inputs.os_patch_level }} -o \( GITHUB_WORKSPACE/output/ \){{ inputs.version_name }}_${{ inputs.os_patch_level }}-boot-gz.img

    - name: Upload Image and Image.gz and boot.img
      uses: actions/upload-artifact@v4
      with:
        name: Image-\( {{ inputs.version_name }}_ \){{ inputs.os_patch_level }}
        path: ./output/*

    - name: Upload AnyKernel3
      uses: actions/upload-artifact@v4
      with:
        name: AnyKernel3-\( {{ inputs.version_name }}_ \){{ inputs.os_patch_level }}
        path: ./AnyKernel3/*
