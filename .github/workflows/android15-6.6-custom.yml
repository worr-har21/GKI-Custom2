name: Android15-6.6-Custom

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      os_patch_level:
        required: true
        type: string
        description: Patch level (z. B. 2024-11)
        default: 2024-11
      os_version:
        required: true
        type: string
        description: OS Version
        default: 15.0.0
      version_name:
        required: true
        type: string
        description: Artifact name
        default: android15-6.6-docker
      custom:
        required: true
        type: boolean
        description: Enable LXC/Docker Support
        default: true
      kernelsu:
        required: true
        type: boolean
        description: Enable KernelSU
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      ACTIONS_STEP_DEBUG: false
      ACTIONS_RUNNER_DEBUG: false

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # 🔥 EXTREM WICHTIG: Speicher freimachen
    - name: Free disk space
      run: |
        echo "=== BEFORE CLEANUP ==="
        df -h

        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*

        echo "=== AFTER CLEANUP ==="
        df -h

    # 🔁 Swap gegen OOM & Log-Explosion
    - name: Enable swap
      run: |
        sudo fallocate -l 8G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          repo \
          wget \
          unzip \
          python3 \
          git \
          zip \
          curl

    - name: Install latest repo tool
      run: |
        curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo > repo
        chmod +x repo
        sudo mv repo /usr/local/bin/repo

    - name: Sync kernel source
      run: |
        mkdir android-kernel
        cd android-kernel
        repo init \
          --depth=1 \
          --no-tags \
          -u https://android.googlesource.com/kernel/manifest \
          -b common-android15-6.6
        repo sync -c -j$(nproc)

    - name: Apply Docker / LXC patches
      if: ${{ inputs.custom }}
      run: |
        git clone https://github.com/rvalyi/GKI-Custom.git gki-patch
        if [ -f gki-patch/config/gki_defconfig-android15-6.6 ]; then
          cp gki-patch/config/gki_defconfig-android15-6.6 \
            android-kernel/common/arch/arm64/configs/gki_defconfig
        fi
        cd android-kernel/common
        git apply $GITHUB_WORKSPACE/gki-patch/patchs/*.patch || true

    - name: KernelSU integration
      if: ${{ inputs.kernelsu }}
      run: |
        cd android-kernel
        curl -LSs https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh | bash -

    - name: Build kernel (Bazel)
      run: |
        cd android-kernel
        mkdir -p out/android15-6.6/dist
        tools/bazel run //common:kernel_aarch64_dist -- \
          --dist_dir=out/android15-6.6/dist

    - name: Sanitize artifact name
      run: |
        SAFE_NAME=$(echo "${{ inputs.version_name }}" | sed 's/[\\/:"<>|*?]/-/g')
        echo "SAFE_ARTIFACT_NAME=Kernel-${SAFE_NAME}-${{ inputs.os_patch_level }}" >> $GITHUB_ENV

    - name: Prepare artifacts
      run: |
        OUTDIR=android-kernel/out/android15-6.6/dist
        mkdir -p output

        cp $OUTDIR/Image* output/ 2>/dev/null || true

        git clone https://github.com/Kernel-SU/AnyKernel3
        rm -rf AnyKernel3/.git
        cp $OUTDIR/Image AnyKernel3/ 2>/dev/null || true

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.SAFE_ARTIFACT_NAME }}
        path: |
          output/*
          AnyKernel3/*
