name: Android15-6.6-Custom

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      os_patch_level:
        required: true
        type: string
        description: Patch level (z. B. 2024-11)
        default: 2025-09
      os_version:
        required: true
        type: string
        description: OS Version
        default: 15.0.0
      version_name:
        required: true
        type: string
        description: Artifact name
        default: android15-6.6-docker
      custom:
        required: true
        type: boolean
        description: Enable LXC/Docker Support
        default: true
      kernelsu:
        required: true
        type: boolean
        description: Enable KernelSU
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      ACTIONS_STEP_DEBUG: false
      ACTIONS_RUNNER_DEBUG: false

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free disk space
      run: |
        echo "=== BEFORE CLEANUP ==="
        df -h
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*
        echo "=== AFTER CLEANUP ==="
        df -h

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y repo wget unzip python3 git zip curl

    - name: Install repo tool
      run: |
        curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o repo
        chmod +x repo
        sudo mv repo /usr/local/bin/repo

    - name: Sync kernel source
      run: |
        mkdir android-kernel
        cd android-kernel
        repo init --depth=1 --no-tags -u https://android.googlesource.com/kernel/manifest -b common-android15-6.6
        repo sync -c -j6

    - name: Apply Docker / LXC patches
      if: ${{ github.event_name == 'push' || inputs.custom == 'true' }}
      run: |
        echo "Applying Docker/LXC patches..."
        git clone https://github.com/worr-har21/gki-patches.git gki-patch
        if [ -f gki-patch/config/gki_defconfig-android15-6.6 ]; then
          cp gki-patch/config/gki_defconfig-android15-6.6 android-kernel/common/arch/arm64/configs/gki_defconfig
        fi
        PATCH_DIR="gki-patch/patchs
        cd android-kernel
        for patch in $PATCH_DIR/*.patch; do
          echo "Checking patch $patch"
          git apply --check "$patch" && git apply "$patch" && echo "Applied $patch" || echo "Patch $patch already applied or failed"
        done

    - name: KernelSU integration
      if: ${{ github.event_name == 'push' || inputs.kernelsu == 'true' }}
      run: |
        echo "Integrating KernelSU..."
        cd android-kernel
        curl -fsSL https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh | bash -x

    - name: Update gki_defconfig with savedefconfig
      run: |
        cd android-kernel
        tools/bazel run //common:kernel_aarch64_config -- --update
    
    - name: Build Kernel (Bazel)
      run: |
        cd android-kernel
        mkdir -p out/android15-6.6/dist
        # Direkt alle Argumente übergeben, kein eval
        tools/bazel run //common:kernel_aarch64_dist \
          --jobs=6 \
          --local_ram_resources=8192 \
          --local_cpu_resources=6 \
          --noshow_progress \
          --announce_rc \
          -- --dist_dir=out/android15-6.6/dist

    - name: Sanitize artifact name
      run: |
        SAFE_NAME=$(echo "${{ inputs.version_name }}" | sed 's/[\\/:"<>|*?]/-/g')
        echo "SAFE_ARTIFACT_NAME=Kernel-${SAFE_NAME}-${{ inputs.os_patch_level }}" >> $GITHUB_ENV

    - name: Prepare artifacts
      run: |
        OUTDIR=android-kernel/out/android15-6.6/dist
        mkdir -p output
        cp $OUTDIR/Image* output/ 2>/dev/null || true
        git clone https://github.com/Kernel-SU/AnyKernel3
        rm -rf AnyKernel3/.git
        cp $OUTDIR/Image AnyKernel3/ 2>/dev/null || true

    - name: Post-build cleanup
      run: |
        # Nur Kernel-relevante Ordner löschen, Fehler ignorieren
        rm -rf android-kernel/.repo || true
        rm -rf ~/.cache/bazel || true
        rm -rf /tmp/* || true
        df -h

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.SAFE_ARTIFACT_NAME }}
        path: |
          output/*
          AnyKernel3/*
